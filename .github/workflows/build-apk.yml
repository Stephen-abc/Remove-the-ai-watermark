name: Build Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Install Dependencies
      working-directory: ./mobile-webapp
      run: |
        npm install
        npm install @capacitor/android

    - name: Initialize Capacitor Android
      working-directory: ./mobile-webapp
      run: |
        npx cap add android
        npx cap sync

    - name: Build APK
      working-directory: ./mobile-webapp/android
      run: |
        chmod +x gradlew
        ./gradlew assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: mobile-webapp/android/app/build/outputs/apk/debug/app-debug.apk